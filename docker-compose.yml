services:
  jira:
    # The addono/jira-software-standalone image only publishes a `:latest` tag
    # (see https://hub.docker.com/r/addono/jira-software-standalone/tags). The
    # actual Jira version is passed as a runtime argument to the entrypoint —
    # the container then downloads and starts that Jira version via the Atlassian
    # SDK at boot. This is the same pattern jira-python uses in CI.
    image: addono/jira-software-standalone:latest
    container_name: jiraps-jira-dc
    ports:
      - "2990:2990"
    # Pin the Jira version here so the Server-track CI exercises a known build.
    # Override via `JIRA_VERSION=X.Y.Z docker compose up -d` to test other releases.
    command: ["--version", "${JIRA_VERSION:-8.17.1}"]
    # Readiness is owned by Tools/Wait-JiraServer.ps1 (it polls /serverInfo and
    # provisions the normal test user). We deliberately omit a Docker healthcheck
    # because the addono image does not ship curl/wget and the PowerShell waiter
    # gives richer diagnostics on a slow boot.
