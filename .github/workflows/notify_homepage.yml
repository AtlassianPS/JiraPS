name: Notify Homepage

on:
  release:
    types: [published]

jobs:
  notify_homepage:
    name: Notify homepage to update submodule
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify homepage
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMEPAGE_PAT }}
          repository: AtlassianPS/AtlassianPS.github.io
          event-type: module-release
          client-payload: >-
            {"module":"JiraPS","version":"${{ github.event.release.tag_name }}"}
