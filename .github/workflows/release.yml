name: Create Release and Publish

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: release_ref
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ github.ref_name }}"

          if [[ ! "$release_tag" =~ ^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Release tag '$release_tag' does not match the expected v-prefixed version pattern."
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$release_tag"; then
            echo "::error::Release ref '$release_tag' is not a tag."
            exit 1
          fi

          tag_type="$(git cat-file -t "refs/tags/$release_tag")"
          if [ "$tag_type" != "tag" ]; then
            echo "::error::Release tag '$release_tag' must be an annotated tag."
            exit 1
          fi

          git fetch --no-tags origin master

          release_sha="$(git rev-list -n 1 "$release_tag")"
          if ! git merge-base --is-ancestor "$release_sha" "origin/master"; then
            echo "::error::Release tag '$release_tag' does not point to a commit reachable from origin/master."
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Download artifact from commit that got tagged
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: ci.yml
          workflow_conclusion: success
          commit: ${{ steps.release_ref.outputs.release_sha }}
          name: Release
          path: ./Release/
          if_no_artifact_found: fail

      - uses: AtlassianPS/AtlassianPS.Standards/.github/actions/setup-powershell@198212f8a114e8382801678dc59295793a5de288 # v0.1.10

      - name: Publish module
        run: |
          Invoke-Build -Task Publish `
            -VersionToPublish ${{ steps.release_ref.outputs.release_tag }} `
            -PSGalleryAPIKey ${{ secrets.PSGALLERY_API_KEY }}
        shell: pwsh

      - name: Build release notes from changelog
        id: changelog
        shell: pwsh
        run: |
          $tag = '${{ steps.release_ref.outputs.release_tag }}'
          $version = $tag.TrimStart('v')
          $content = Get-Content -LiteralPath './CHANGELOG.md' -Raw -ErrorAction Stop
          $escapedVersion = [System.Text.RegularExpressions.Regex]::Escape($version)
          $match = [System.Text.RegularExpressions.Regex]::Match(
              $content,
              "(?ms)^##\s+$escapedVersion(?:\s+-\s+[^\r\n]*|\s*\([^)]+\))?\s*\r?\n(?<body>.*?)(?=^##\s+|\z)"
          )
          if (-not $match.Success) {
              throw "Could not find changelog section for $tag. Expected a heading like '## $version - YYYY-MM-DD'."
          }

          $body = $match.Groups['body'].Value.Trim()
          if ([string]::IsNullOrWhiteSpace($body)) {
              throw "Changelog section for $tag is empty."
          }

          $delimiter = [guid]::NewGuid().ToString('N')
          "body<<$delimiter" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          $delimiter >> $env:GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: ./Release/JiraPS.zip
          fail_on_unmatched_files: true
          draft: false
          tag_name: ${{ steps.release_ref.outputs.release_tag }}
          name: ${{ steps.release_ref.outputs.release_tag }}
          prerelease: ${{ contains(steps.release_ref.outputs.release_tag, 'alpha') || contains(steps.release_ref.outputs.release_tag,
            'beta') || contains(steps.release_ref.outputs.release_tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
