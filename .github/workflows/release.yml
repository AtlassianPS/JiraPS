name: Create Release and Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (for manual reruns)"
        required: true
        type: string

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Resolve release ref
        id: release_ref
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${{ github.ref_name }}"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Release tag '$release_tag' does not match the expected v-prefixed version pattern."
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$release_tag"; then
            echo "::error::Release ref '$release_tag' is not a tag."
            exit 1
          fi

          tag_type="$(git cat-file -t "refs/tags/$release_tag")"
          if [ "$tag_type" != "tag" ]; then
            echo "::error::Release tag '$release_tag' must be an annotated tag."
            exit 1
          fi

          git fetch --no-tags origin master

          release_sha="$(git rev-list -n 1 "$release_tag")"
          if ! git merge-base --is-ancestor "$release_sha" "origin/master"; then
            echo "::error::Release tag '$release_tag' does not point to a commit reachable from origin/master."
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Download artifact from commit that got tagged
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: ci.yml
          workflow_conclusion: success
          commit: ${{ steps.release_ref.outputs.release_sha }}
          name: Release
          path: ./Release/
          if_no_artifact_found: fail

      - uses: AtlassianPS/AtlassianPS.Standards/.github/actions/setup-powershell@9a9367e22847bd24f86208ed2d98d207b0e2a3b3 # v0.1.6

      - run: Invoke-Build -Task Publish -VersionToPublish ${{ steps.release_ref.outputs.release_tag }}
          -PSGalleryAPIKey ${{ secrets.PSGALLERY_API_KEY }}
        shell: pwsh

      - name: Cherry pick CHANGELOG.md
        id: changelog
        uses: MatteoCampinoti94/changelog-to-release@v1.0.6
        with:
          version-name: ${{ steps.release_ref.outputs.release_tag }}
          configuration: ./.github/changelog.configuration.json
        if: ${{ hashFiles('CHANGELOG.md') != '' }}

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: ./Release/JiraPS.zip
          fail_on_unmatched_files: true
          draft: false
          tag_name: ${{ steps.release_ref.outputs.release_tag }}
          name: ${{ steps.release_ref.outputs.release_tag }}
          prerelease: ${{ contains(steps.release_ref.outputs.release_tag, 'alpha') || contains(steps.release_ref.outputs.release_tag,
            'beta') || contains(steps.release_ref.outputs.release_tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify homepage to update submodule
        if: ${{ !contains(steps.release_ref.outputs.release_tag, 'alpha') && !contains(steps.release_ref.outputs.release_tag,
          'beta') && !contains(steps.release_ref.outputs.release_tag, 'rc') }}
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMEPAGE_PAT }}
          repository: AtlassianPS/AtlassianPS.github.io
          event-type: module-release
          client-payload: "{\"module\": \"JiraPS\", \"version\": \"${{ steps.release_ref.outputs.release_tag }}\"}"
