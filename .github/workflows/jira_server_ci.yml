name: Jira Server (Data Center) Integration Tests

# DC track: lazy-bootstrapped Docker, ~5 min Jira boot + tests.
# Mirrors integration_tests.yml (the Cloud track) but runs against a Dockerized
# addono/jira-software-standalone:8.17.1 container instead of a live Cloud instance,
# so it needs no secrets and exercises the Data Center code paths the Cloud track
# cannot cover.
on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - "CHANGELOG.md"
      - "LICENSE"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - ".cursor/**"
      - ".github/copilot-instructions.md"
      - ".github/ai-context/**"
      - ".github/instructions/**"
      - ".github/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".vscode/**"
      - ".editorconfig"
      - ".spelling"
      - "docs-regenerated/**"
  schedule:
    # Offset from stale_cleanup (04:00 UTC) and integration_tests Cloud (06:00 UTC).
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: jira-server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  server_smoke_tests:
    name: Server Smoke Tests (Dockerized Jira DC)
    runs-on: ubuntu-latest
    # Skip on fork PRs and Dependabot PRs to stay consistent with the Cloud workflow.
    # The Server track does not need secrets (admin/admin is baked into the image),
    # so the gating is purely about not running CI work for untrusted contexts.
    if: github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    timeout-minutes: 25
    env:
      CI_JIRA_TYPE: Server
      CI_JIRA_URL: http://localhost:2990/jira
      CI_JIRA_ADMIN: admin
      CI_JIRA_ADMIN_PASSWORD: admin
      CI_JIRA_USER: jira_user
      CI_JIRA_USER_PASSWORD: jira
    steps:
      - uses: actions/checkout@v6

      - name: Start Jira Data Center container
        run: docker compose up -d
        shell: bash

      - uses: ./.github/actions/setup-powershell

      - name: Wait for Jira to become reachable and provision the normal user
        run: pwsh ./Tools/Wait-JiraServer.ps1 -TimeoutSeconds 900

      - name: Run Server-tagged integration tests
        run: |
          Invoke-Build -Task TestIntegration -Tag 'Server' -PesterVerbosity Detailed
        shell: pwsh

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Integration-Tests
          path: IntegrationTests.xml

      - name: Capture Jira container logs for debugging
        if: always()
        run: docker compose logs jira > jira-container.log
        shell: bash

      - name: Upload Jira container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Jira-Container-Logs
          path: jira-container.log

      - name: Tear down Jira Data Center container
        if: always()
        run: docker compose down -v
        shell: bash
