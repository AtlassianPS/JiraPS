name: Jira Server (Data Center) Integration Tests

# DC track: lazy-bootstrapped Docker, ~5-10 min Jira boot + tests.
# Mirrors integration_tests.yml (the Cloud track) but runs against a Dockerized
# Jira Data Center booted from the moveworkforward/atlas-run-standalone:jira-11
# image (Atlassian Plugin SDK 9.6.0 + Jira Software 11.0.1, ~1.2 GB compressed
# amd64 build pinned in docker-compose.yml). It needs no secrets and exercises
# the Data Center code paths the Cloud track cannot cover.
#
# Why moveworkforward and not the older addono/jira-software-standalone image:
# the addono image's bundled Plugin SDK (8.2.8, frozen since 2021) calls the
# retired marketplace.atlassian.com/.../atlassian-plugin-sdk-rpm endpoint at
# boot and dies before Jira ever starts. moveworkforward ships SDK 9.6.0 which
# resolves dependencies via the still-live packages.atlassian.com Artifactory
# instead, so it actually boots end-to-end.
on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - "CHANGELOG.md"
      - "LICENSE"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - ".cursor/**"
      - ".github/copilot-instructions.md"
      - ".github/ai-context/**"
      - ".github/instructions/**"
      - ".github/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".vscode/**"
      - ".editorconfig"
      - ".spelling"
      - "docs-regenerated/**"
  schedule:
    # Offset from stale_cleanup (04:00 UTC) and integration_tests Cloud (06:00 UTC).
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: jira-server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  server_smoke_tests:
    name: Server Smoke Tests (Dockerized Jira DC)
    runs-on: ubuntu-latest
    # Skip on fork PRs and Dependabot PRs to stay consistent with the Cloud workflow.
    # The Server track does not need secrets (admin/admin is baked into the image),
    # so the gating is purely about not running CI work for untrusted contexts.
    if: github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    # Boot budget: pulling the ~1.2 GB image (~1 min on a warm runner), Maven
    # dependency verification (~3 min), Tomcat 10.1.44 startup + jira.war
    # extraction + plugin scan + first-time DB init (~5-10 min on cold boot).
    # The 30 min cap leaves ~10-15 min for the actual Pester tests.
    timeout-minutes: 30
    env:
      CI_JIRA_TYPE: Server
      CI_JIRA_URL: http://localhost:2990/jira
      CI_JIRA_ADMIN: admin
      CI_JIRA_ADMIN_PASSWORD: admin
      CI_JIRA_USER: jira_user
      CI_JIRA_USER_PASSWORD: jira
    steps:
      - uses: actions/checkout@v6

      - name: Start Jira Data Center container
        run: docker compose up -d
        shell: bash

      - uses: ./.github/actions/setup-powershell

      - name: Wait for Jira to become reachable and provision the normal user
        run: pwsh ./Tools/Wait-JiraServer.ps1 -TimeoutSeconds 1200

      - name: Run Server smoke test suite
        # Scope: ONLY Tests/Integration/Server.Integration.Tests.ps1.
        #
        # The other Server-tagged integration tests (Comments, Filters, Search,
        # Versions, Worklogs, ...) all assume a fixture project keyed 'TEST'
        # exists, but the moveworkforward/atlas-run-standalone image boots a
        # bare Jira platform without the jira-software / jira-core plugins
        # activated, so /rest/api/2/project rejects every projectType we send.
        # Wait-JiraServer.ps1 logs the fact and exits 0; the smoke suite is
        # purpose-built to skip its CRUD test in that case (see line 111 of
        # Server.Integration.Tests.ps1) so this job stays green and proves the
        # full DC plumbing - container boot, Basic-auth session, DC-style user
        # lookup by `name`, deploymentType==Server - works end-to-end.
        #
        # We scope by file path rather than by tag because Pester 5 ORs tags,
        # so a `-Tag 'Smoke'` filter would also pick up Smoke-tagged tests in
        # New-JiraIssue.Integration.Tests.ps1 / Search.Integration.Tests.ps1
        # which assume the fixture project exists.
        #
        # The broader Server-tagged suite is tracked as a follow-up: it needs a
        # real project fixture, which means either bootstrapping a Jira instance
        # with jira-software pre-installed, or seeding via SQL/dbconfig.xml. See
        # the AMPS standalone limitation note in Tests/Integration/README.md.
        run: |
          Invoke-Build -Task TestIntegration -IntegrationTestPath ./Tests/Integration/Server.Integration.Tests.ps1 -PesterVerbosity Detailed
        shell: pwsh

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Integration-Tests
          path: IntegrationTests.xml

      - name: Capture Jira container logs for debugging
        if: always()
        run: docker compose logs jira > jira-container.log
        shell: bash

      - name: Upload Jira container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Jira-Container-Logs
          path: jira-container.log

      - name: Tear down Jira Data Center container
        if: always()
        run: docker compose down -v
        shell: bash
