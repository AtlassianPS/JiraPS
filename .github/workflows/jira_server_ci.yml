name: Jira Server (Data Center) Integration Tests

# === STATUS: MANUAL-DISPATCH ONLY (workflow disabled on PR/schedule) ===
#
# The DC integration track is structurally complete (docker-compose.yml,
# Tools/Wait-JiraServer.ps1, the Server-tagged Pester suite, the deployment-
# aware helpers in Tests/Helpers/IntegrationTestTools.ps1) but cannot run
# end-to-end today because the only viable Dockerized Jira-Server image we
# could find — addono/jira-software-standalone — is unsupported and broken
# upstream:
#
#   1. The image was last touched in 2021; the author has stated the project
#      is unsupported (https://github.com/Addono/docker-jira-software-standalone).
#   2. Its entrypoint runs the Atlassian Plugin SDK (`atlas-run-standalone
#      --product jira --version X.Y.Z`), which during boot calls
#      https://marketplace.atlassian.com/rest/1.0/plugins/atlassian-plugin-sdk-rpm.
#      Atlassian retired that endpoint in 2025, so the SDK now dies with
#      `java.io.FileNotFoundException` before Jira itself ever starts.
#   3. pycontribs/jira hit the same wall — see PR #2376 ("enable CI on cloud
#      again (server seems to be pretty hard tbh)") and the follow-up commit
#      "ci: remove broken workflows".
#
# The official `atlassian/jira-software:8.17.1` image works but needs a
# developer license, DB config, and an automated setup-wizard run before it
# accepts API calls, which is significant additional scaffolding we are not
# building right now. Tracked in the Backlog issue linked from the PR that
# introduced this workflow.
#
# We keep the workflow file (with `workflow_dispatch` only) so a maintainer
# can manually re-run it the moment a working image is available; flipping
# the triggers back on is then a one-line change. Until then it stays out
# of the PR/scheduled rotation so we are not noisy and red on every push.
on:
  workflow_dispatch:

jobs:
  server_smoke_tests:
    name: Server Smoke Tests (Dockerized Jira DC)
    runs-on: ubuntu-latest
    # workflow_dispatch is the only trigger today; no need to gate on event/actor.
    # The Server track does not need secrets (admin/admin is baked into the image),
    # so re-introducing pull_request triggers later only requires restoring the
    # `if:` guard that excluded fork PRs and Dependabot here.
    timeout-minutes: 25
    env:
      CI_JIRA_TYPE: Server
      CI_JIRA_URL: http://localhost:2990/jira
      CI_JIRA_ADMIN: admin
      CI_JIRA_ADMIN_PASSWORD: admin
      CI_JIRA_USER: jira_user
      CI_JIRA_USER_PASSWORD: jira
    steps:
      - uses: actions/checkout@v6

      - name: Start Jira Data Center container
        run: docker compose up -d
        shell: bash

      - uses: ./.github/actions/setup-powershell

      - name: Wait for Jira to become reachable and provision the normal user
        run: pwsh ./Tools/Wait-JiraServer.ps1 -TimeoutSeconds 900

      - name: Run Server-tagged integration tests
        run: |
          Invoke-Build -Task TestIntegration -Tag 'Server' -PesterVerbosity Detailed
        shell: pwsh

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Integration-Tests
          path: IntegrationTests.xml

      - name: Capture Jira container logs for debugging
        if: always()
        run: docker compose logs jira > jira-container.log
        shell: bash

      - name: Upload Jira container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Jira-Container-Logs
          path: jira-container.log

      - name: Tear down Jira Data Center container
        if: always()
        run: docker compose down -v
        shell: bash
