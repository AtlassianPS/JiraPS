name: Jira Server (Data Center) Integration Tests

# DC track: lazy-bootstrapped Docker, ~5-10 min Jira boot + tests.
# Mirrors integration_tests.yml (the Cloud track) but runs against a Dockerized
# Jira Data Center booted from the moveworkforward/atlas-run-standalone:jira-11
# image (Atlassian Plugin SDK 9.6.0 + Jira Software 11.0.1, ~1.2 GB compressed
# amd64 build pinned in docker-compose.yml). It needs no secrets and exercises
# the Data Center code paths the Cloud track cannot cover.
#
# Why moveworkforward and not the older addono/jira-software-standalone image:
# the addono image's bundled Plugin SDK (8.2.8, frozen since 2021) calls the
# retired marketplace.atlassian.com/.../atlassian-plugin-sdk-rpm endpoint at
# boot and dies before Jira ever starts. moveworkforward ships SDK 9.6.0 which
# resolves dependencies via the still-live packages.atlassian.com Artifactory
# instead, so it actually boots end-to-end.
on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - "CHANGELOG.md"
      - "LICENSE"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - ".cursor/**"
      - ".github/copilot-instructions.md"
      - ".github/ai-context/**"
      - ".github/instructions/**"
      - ".github/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".vscode/**"
      - ".editorconfig"
      - ".spelling"
      - "docs-regenerated/**"
  schedule:
    # Offset from stale_cleanup (04:00 UTC) and integration_tests Cloud (06:00 UTC).
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: jira-server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  server_integration_tests:
    name: Server Integration Tests (Dockerized Jira DC)
    runs-on: ubuntu-latest
    # Skip on fork PRs and Dependabot PRs to stay consistent with the Cloud workflow.
    # The Server track does not need secrets (admin/admin is baked into the image),
    # so the gating is purely about not running CI work for untrusted contexts.
    if: github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    # The Server track is wired up end-to-end: docker-compose boots
    # moveworkforward/atlas-run-standalone, Wait-JiraServer.ps1 provisions
    # the test user, the TEST fixture project (via dynamic
    # /rest/project-templates/1.0/templates discovery), and the TEST-1
    # baseline issue, and the full Server-tagged Pester suite then runs
    # against them. ~50 tests already pass on a clean boot. The remaining
    # ~57 failures fall into three buckets that need per-test triage and
    # are tracked as follow-up work:
    #
    #   1. Mistagged Cloud-only assertions (e.g.
    #      `identifies as Cloud deployment` should not carry the Server
    #      tag).
    #   2. Tests that assume fixtures the AMPS standalone image cannot
    #      ship by default (saved filters, project components / versions,
    #      pre-installed plugins like ScriptRunner).
    #   3. Tests that hardcode default-workflow transitions
    #      (`To Do -> In Progress -> Done`) that the auto-provisioned
    #      jira-core template does not expose.
    #
    # The job is marked continue-on-error so it does not block the PR
    # while those fixes land incrementally — but the test results /
    # container logs are uploaded as artifacts on every run so the
    # cleanup work has the evidence it needs. The smoke suite still runs
    # in the existing CI workflow as the hard regression gate.
    continue-on-error: true
    # Boot budget: pulling the ~1.2 GB image (~1 min on a warm runner), Maven
    # dependency verification (~3 min), Tomcat 10.1.44 startup + jira.war
    # extraction + plugin scan + first-time DB init (~5-10 min on cold boot).
    # The full Server-tagged Pester suite (~150 tests across 25+ files, run via
    # `Tests/Invoke-ParallelPester.ps1` with ThrottleLimit=4) currently takes
    # ~15-20 min end-to-end against the H2-backed AMPS standalone image — most
    # of that is the per-test issue/version provisioning round-trip latency,
    # which is gated on Lucene reindex commits inside the embedded Jira and
    # cannot meaningfully be parallelised further without sharding workers
    # across multiple containers. The 60 min cap therefore leaves a comfortable
    # ~40-45 min margin for the actual Pester run on cold-boot CI runs while
    # still surfacing genuine hangs (the runner kills on its own well before
    # the 6 hr GitHub Actions hard ceiling).
    timeout-minutes: 60
    env:
      CI_JIRA_TYPE: Server
      CI_JIRA_URL: http://localhost:2990/jira
      CI_JIRA_ADMIN: admin
      CI_JIRA_ADMIN_PASSWORD: admin
      CI_JIRA_USER: jira_user
      CI_JIRA_USER_PASSWORD: jira
    steps:
      - uses: actions/checkout@v6

      - name: Start Jira Data Center container
        run: docker compose up -d
        shell: bash

      - uses: ./.github/actions/setup-powershell

      - name: Wait for Jira to become reachable and provision the normal user
        run: pwsh ./Tools/Wait-JiraServer.ps1 -TimeoutSeconds 1200

      - name: Run full Server-tagged integration suite
        # Scope: every test file with the 'Server' tag (Server smoke + the broader
        # Server-tagged CRUD suites — Comments, Filters, Search, Versions,
        # Worklogs, IssueLinks, Transitions, Metadata, Projects, etc.).
        #
        # Wait-JiraServer.ps1 (previous step) discovers the actual
        # (projectTypeKey, projectTemplateKey) pairs the running instance
        # advertises via /rest/project-templates/1.0/templates and provisions
        # the fixture project + a baseline issue, then exports
        # JIRA_TEST_PROJECT and JIRA_TEST_ISSUE to GITHUB_ENV so the env
        # vars are visible to this step. Tests that need a fixture issue
        # gate on `$testEnv.TestIssue` and self-skip when it is missing
        # (see Get-JiraIssue.Integration.Tests.ps1 BeforeDiscovery for the
        # canonical pattern), so the suite stays green even if the AMPS
        # standalone image refuses to seed an issue for the chosen template.
        run: |
          Invoke-Build -Task TestIntegration -Tag 'Server' -PesterVerbosity Detailed
        shell: pwsh

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Integration-Tests
          path: IntegrationTests.xml

      - name: Capture Jira container logs for debugging
        if: always()
        run: docker compose logs jira > jira-container.log
        shell: bash

      - name: Upload Jira container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Server-Jira-Container-Logs
          path: jira-container.log

      - name: Tear down Jira Data Center container
        if: always()
        run: docker compose down -v
        shell: bash
