name: Integration Tests

on:
  pull_request:
    branches:
      - master
    types: [ opened, synchronize, reopened, labeled ]
    paths-ignore:
      - "CHANGELOG.md"
      - "LICENSE"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - ".cursor/**"
      - ".github/copilot-instructions.md"
      - ".github/ai-context/**"
      - ".github/instructions/**"
      - ".github/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".vscode/**"
      - ".editorconfig"
      - ".spelling"
      - "docs-regenerated/**"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  JIRA_CLOUD_URL: ${{ secrets.JIRA_CLOUD_URL }}
  JIRA_CLOUD_USERNAME: ${{ secrets.JIRA_CLOUD_USERNAME }}
  JIRA_CLOUD_PASSWORD: ${{ secrets.JIRA_CLOUD_PASSWORD }}
  JIRA_TEST_PROJECT: ${{ secrets.JIRA_TEST_PROJECT }}
  JIRA_TEST_ISSUE: ${{ secrets.JIRA_TEST_ISSUE }}
  JIRA_TEST_USER: ${{ secrets.JIRA_TEST_USER }}
  JIRA_TEST_GROUP: ${{ secrets.JIRA_TEST_GROUP }}
  JIRA_TEST_FILTER: ${{ secrets.JIRA_TEST_FILTER }}
  JIRA_TEST_VERSION: ${{ secrets.JIRA_TEST_VERSION }}

jobs:
  smoke_tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    # Skip on fork PRs - secrets are not available and tests would fail.
    # The TestIntegration build task validates required env vars and fails
    # early with a clear error if any are missing.
    if: github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-powershell

      - run: |
          Invoke-Build -Task TestIntegration -Tag 'Smoke' -PesterVerbosity Detailed
        shell: pwsh

      - uses: actions/upload-artifact@v6
        with:
          name: Smoke-Tests
          path: IntegrationTests.xml
        if: always()

  integration_tests:
    name: Full Integration Tests
    needs: smoke_tests
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       contains(github.event.pull_request.labels.*.name, 'run-integration-tests'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-powershell

      - run: |
          Invoke-Build -Task TestIntegration -ThrottleLimit 6 -PesterVerbosity Detailed
        shell: pwsh

      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: Integration-Tests
          path: IntegrationTests.xml
        if: always()
