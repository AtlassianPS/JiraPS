name: Build and Test

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_module:
    name: Build Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup PowerShell module cache
        id: cacher
        uses: actions/cache@v5
        with:
          path: "~/.local/share/powershell/Modules"
          key: ${{ runner.os }}-PSModules
      - name: Setup
        shell: pwsh
        run: |
          ./Tools/setup.ps1
          Invoke-Build -Task ShowDebugInfo
      - name: Build
        shell: pwsh
        run: |
          Invoke-Build -Task Clean, Build
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Release
          path: ./Release/

  test_on_windows_v5:
    name: Test Module on Windows (PS v5)
    needs: build_module
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download
        uses: actions/download-artifact@v8
        with:
          name: Release
          path: ./Release/
      - name: Setup PowerShell module cache
        id: cacher
        uses: actions/cache@v5
        with:
          path: "~/Documents/WindowsPowerShell/Modules"
          key: ${{ runner.os }}-v5-PSModules
      - name: Setup
        shell: powershell
        run: |
          ./Tools/setup.ps1
          Invoke-Build -Task ShowDebugInfo
      - name: Test
        shell: powershell
        run: |
          Invoke-Build -Task Test
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ runner.os }}v5-Unit-Tests
          path: Test*.xml
    if: ${{ always() }}

  test_on_windows_v7:
    name: Test Module on Windows (PS v7)
    needs: build_module
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download
        uses: actions/download-artifact@v8
        with:
          name: Release
          path: ./Release/
      - name: Setup PowerShell module cache
        id: cacher
        uses: actions/cache@v5
        with:
          path: "~/Documents/PowerShell/Modules"
          key: ${{ runner.os }}-v7-PSModules
      - name: Setup
        shell: pwsh
        run: |
          ./Tools/setup.ps1
          Invoke-Build -Task ShowDebugInfo
      - name: Test
        shell: pwsh
        run: |
          Invoke-Build -Task Test
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ runner.os }}v7-Unit-Tests
          path: Test*.xml
    if: ${{ always() }}

  test_on_ubuntu:
    name: Test Module on Ubuntu
    needs: build_module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download
        uses: actions/download-artifact@v8
        with:
          name: Release
          path: ./Release/
      - name: Setup PowerShell module cache
        id: cacher
        uses: actions/cache@v5
        with:
          path: "~/.local/share/powershell/Modules"
          key: ${{ runner.os }}-PSModules
      - name: Setup
        shell: pwsh
        run: |
          ./Tools/setup.ps1
          Invoke-Build -Task ShowDebugInfo
      - name: Test
        shell: pwsh
        run: |
          Invoke-Build -Task Test
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ runner.os }}-Unit-Tests
          path: Test*.xml
    if: ${{ always() }}

  test_on_macos:
    name: Test Module on macOS
    needs: build_module
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download
        uses: actions/download-artifact@v8
        with:
          name: Release
          path: ./Release/
      - name: Setup PowerShell module cache
        id: cacher
        uses: actions/cache@v5
        with:
          path: "~/.local/share/powershell/Modules"
          key: ${{ runner.os }}-PSModules
      - name: Setup
        shell: pwsh
        run: |
          ./Tools/setup.ps1
          Invoke-Build -Task ShowDebugInfo
      - name: Test
        shell: pwsh
        run: |
          Invoke-Build -Task Test
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ runner.os }}-Unit-Tests
          path: Test*.xml
    if: ${{ always() }}
